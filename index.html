<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FastTrack Express</title>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:Arial,Helvetica,sans-serif;

}

body{

background:url("https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=1600")

center center/cover no-repeat fixed;

min-height:100vh;

}

nav{

display:flex;

justify-content:space-between;

align-items:center;

padding:25px 70px;

background:rgba(0,0,70,.75);

}

.logo{

font-size:38px;

font-weight:bold;

color:white;

}

.logo span{

color:gold;

}

nav ul{

display:flex;

list-style:none;

gap:40px;

}

nav a{

text-decoration:none;

font-size:22px;

color:white;

}

.container{

width:90%;

max-width:900px;

margin:80px auto;

padding:50px;

text-align:center;

background:rgba(255,255,255,.15);

backdrop-filter:blur(15px);

border-radius:25px;

color:white;

}

h1{

font-size:65px;

margin-bottom:15px;

}

p{

font-size:28px;

margin-bottom:35px;

}

input{

width:100%;

padding:22px;

font-size:24px;

border:none;

border-radius:12px;

outline:none;

}

button{

margin-top:25px;

padding:18px 45px;

font-size:24px;

background:#00b300;

color:white;

border:none;

border-radius:10px;

cursor:pointer;

}

button:hover{

background:#008000;

}

#result{

margin-top:40px;

font-size:30px;

font-weight:bold;

}

footer{

position:fixed;

bottom:0;

width:100%;

padding:20px;

text-align:center;

background:rgba(0,0,70,.85);

color:white;

font-size:20px;

}

</style>

</head>

<body>

<nav>

<div class="logo">

FASTTRACK <span>EXPRESS</span>

</div>

<ul>

<li><a href="#">Home</a></li>

<li><a href="#">Track</a></li>

<li><a href="#">Services</a></li>

<li><a href="#">Contact</a></li>

</ul>

</nav>

<div class="container">

<h1>Track Your Shipment</h1>

<p>Worldwide Shipping Services</p>

<input id="track" placeholder="Enter Tracking Number">

<br>

<button onclick="trackPackage()">

Track Package

</button>

<div id="result"></div>

</div>

<footer>

☎ +1 800 555 1234

</footer>

<script>

function trackPackage(){

let number=document.getElementById("track").value;

let result=document.getElementById("result");

if(number=="FT123456789"){

result.innerHTML=`

✅ DELIVERED

<br><br>

Recipient : Jintana Jintana

<br>

Location : Bangkok, Thailand

<br>

Delivered on : 26 June 2026

`;

result.style.color="lime";

}

else{

result.innerHTML="❌ Tracking Number Not Found";

result.style.color="red";

}

}

</script>

</body>

</html>
